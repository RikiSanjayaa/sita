name: deploy

on:
  workflow_run:
    workflows:
      - tests
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: none

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  verify:
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare Laravel app
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test --compact

      - name: Run frontend type checks
        run: npm run types

  deploy:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Validate Tailscale OAuth credentials
        env:
          TS_OAUTH_CLIENT_ID_RAW: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET_RAW: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          set -euo pipefail

          client_id="$(printf '%s' "${TS_OAUTH_CLIENT_ID_RAW}" | tr -d '\r\n')"
          oauth_secret="$(printf '%s' "${TS_OAUTH_SECRET_RAW}" | tr -d '\r\n')"

          if [[ -z "${client_id}" || -z "${oauth_secret}" ]]; then
            echo "TS_OAUTH_CLIENT_ID and TS_OAUTH_SECRET are required."
            exit 1
          fi

          if [[ "${client_id}" == tskey-auth-* || "${client_id}" == tskey-api-* || "${oauth_secret}" == tskey-auth-* || "${oauth_secret}" == tskey-api-* ]]; then
            echo "Detected auth/API key format (tskey-auth-* or tskey-api-*). Use OAuth client credentials instead."
            exit 1
          fi

          if [[ "${client_id}" =~ [[:space:]] || "${oauth_secret}" =~ [[:space:]] ]]; then
            echo "Tailscale OAuth credentials must not contain spaces or line breaks."
            exit 1
          fi

          if [[ ("${client_id:0:1}" == '"' && "${client_id: -1}" == '"') || ("${client_id:0:1}" == "'" && "${client_id: -1}" == "'") ]]; then
            echo "Do not wrap TS_OAUTH_CLIENT_ID with quotes in GitHub Secrets."
            exit 1
          fi

          if [[ ("${oauth_secret:0:1}" == '"' && "${oauth_secret: -1}" == '"') || ("${oauth_secret:0:1}" == "'" && "${oauth_secret: -1}" == "'") ]]; then
            echo "Do not wrap Tailscale secrets with quotes in GitHub Secrets."
            exit 1
          fi

          echo "::notice::Tailscale OAuth credential lengths: id=${#client_id}, secret=${#oauth_secret}"
          echo "::add-mask::${client_id}"
          echo "::add-mask::${oauth_secret}"
          echo "TS_OAUTH_CLIENT_ID=${client_id}" >> "$GITHUB_ENV"
          echo "TS_OAUTH_SECRET=${oauth_secret}" >> "$GITHUB_ENV"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.DEPLOY_HOST }}

      - name: Print Tailscale status
        run: |
          tailscale status || true

      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve deploy host
        id: resolve-host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.DEPLOY_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_HOST}" ]]; then
            echo "DEPLOY_HOST secret is required"
            exit 1
          fi

          resolved_host=""
          if [[ "${DEPLOY_HOST}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            resolved_host="${DEPLOY_HOST}"
          else
            for attempt in {1..20}; do
              if getent hosts "${DEPLOY_HOST}" >/dev/null 2>&1; then
                resolved_host="${DEPLOY_HOST}"
                break
              fi

              tailscale ping -c 1 "${DEPLOY_HOST}" >/dev/null 2>&1 || true
              sleep 3
            done
          fi

          if [[ -z "${resolved_host}" ]]; then
            echo "Unable to resolve DEPLOY_HOST='${DEPLOY_HOST}' on this runner."
            echo "Use a Tailscale IP (100.x.y.z) or full MagicDNS hostname."
            tailscale status || true
            exit 1
          fi

          echo "target=${resolved_host}" >> "$GITHUB_OUTPUT"
          echo "port=${DEPLOY_PORT}" >> "$GITHUB_OUTPUT"

      - name: Probe SSH connectivity
        env:
          DEPLOY_TARGET: ${{ steps.resolve-host.outputs.target }}
          DEPLOY_PORT: ${{ steps.resolve-host.outputs.port }}
        run: |
          set -euo pipefail
          tailscale ping -c 1 "${DEPLOY_TARGET}" >/dev/null 2>&1 || true
          for attempt in {1..10}; do
            if nc -z -w 3 "${DEPLOY_TARGET}" "${DEPLOY_PORT}"; then
              exit 0
            fi
            sleep 2
          done

          echo "SSH port ${DEPLOY_PORT} is not reachable on ${DEPLOY_TARGET}."
          echo "Check sshd status, firewall, and Tailscale ACLs."
          tailscale ping -c 3 "${DEPLOY_TARGET}" || true
          tailscale status || true
          exit 1

      - name: Trust deploy host
        env:
          DEPLOY_TARGET: ${{ steps.resolve-host.outputs.target }}
          DEPLOY_PORT: ${{ steps.resolve-host.outputs.port }}
        run: |
          set -euo pipefail
          for attempt in {1..10}; do
            if ssh-keyscan -T 5 -p "${DEPLOY_PORT}" -H "${DEPLOY_TARGET}" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Failed to collect SSH host key for ${DEPLOY_TARGET}:${DEPLOY_PORT}"
          exit 1

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ steps.resolve-host.outputs.target }}
          DEPLOY_PORT: ${{ steps.resolve-host.outputs.port }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
          VITE_REVERB_APP_KEY: ${{ secrets.VITE_REVERB_APP_KEY }}
          VITE_REVERB_HOST: ${{ vars.FRONTEND_REVERB_HOST || '' }}
          VITE_REVERB_PORT: ${{ vars.FRONTEND_REVERB_PORT || '443' }}
          VITE_REVERB_SCHEME: ${{ vars.VITE_REVERB_SCHEME || 'https' }}
        run: |
          set -euo pipefail
          printf -v deploy_path_q '%q' "${DEPLOY_PATH}"
          printf -v healthcheck_url_q '%q' "${HEALTHCHECK_URL:-}"
          printf -v vite_reverb_app_key_q '%q' "${VITE_REVERB_APP_KEY:-}"
          printf -v vite_reverb_host_q '%q' "${VITE_REVERB_HOST:-}"
          printf -v vite_reverb_port_q '%q' "${VITE_REVERB_PORT:-443}"
          printf -v vite_reverb_scheme_q '%q' "${VITE_REVERB_SCHEME:-https}"
          ssh -p "${DEPLOY_PORT}" -o ConnectTimeout=10 -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_PATH=${deploy_path_q} HEALTHCHECK_URL=${healthcheck_url_q} VITE_REVERB_APP_KEY=${vite_reverb_app_key_q} VITE_REVERB_HOST=${vite_reverb_host_q} VITE_REVERB_PORT=${vite_reverb_port_q} VITE_REVERB_SCHEME=${vite_reverb_scheme_q} bash -se" <<'EOF'
          set -euo pipefail
          export DEPLOY_PATH HEALTHCHECK_URL VITE_REVERB_APP_KEY VITE_REVERB_HOST VITE_REVERB_PORT VITE_REVERB_SCHEME
          cd "${DEPLOY_PATH}"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main
          bash scripts/deploy-via-compose.sh
          EOF
