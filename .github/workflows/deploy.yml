name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare Laravel app
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test --compact

      - name: Run frontend type checks
        run: npm run types

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify

    outputs:
      app-image: ${{ steps.meta.outputs.app_image }}
      web-image: ${{ steps.meta.outputs.web_image }}
      owner-lower: ${{ steps.meta.outputs.owner_lower }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image names
        id: meta
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          owner_lower=$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lower=${owner_lower}" >> "$GITHUB_OUTPUT"
          echo "app_image=ghcr.io/${owner_lower}/sita-app:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${owner_lower}/sita-web:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: app
          push: true
          tags: |
            ${{ steps.meta.outputs.app_image }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/sita-app:main
          build-args: |
            INSTALL_DEV_DEPENDENCIES=false
            VITE_REVERB_APP_KEY=${{ secrets.VITE_REVERB_APP_KEY }}
            VITE_REVERB_HOST=${{ vars.FRONTEND_REVERB_HOST || 'localhost' }}
            VITE_REVERB_PORT=${{ vars.FRONTEND_REVERB_PORT || '8089' }}
            VITE_REVERB_SCHEME=${{ vars.VITE_REVERB_SCHEME || 'http' }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: web
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/sita-web:main
          build-args: |
            INSTALL_DEV_DEPENDENCIES=false
            VITE_REVERB_APP_KEY=${{ secrets.VITE_REVERB_APP_KEY }}
            VITE_REVERB_HOST=${{ vars.FRONTEND_REVERB_HOST || 'localhost' }}
            VITE_REVERB_PORT=${{ vars.FRONTEND_REVERB_PORT || '8089' }}
            VITE_REVERB_SCHEME=${{ vars.VITE_REVERB_SCHEME || 'http' }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust deploy host
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          APP_IMAGE: ${{ needs.build-and-push.outputs.app-image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web-image }}
          HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "bash -se" <<EOF
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
          APP_IMAGE="${APP_IMAGE}" WEB_IMAGE="${WEB_IMAGE}" HEALTHCHECK_URL="${HEALTHCHECK_URL}" bash scripts/deploy-via-compose.sh
          EOF
