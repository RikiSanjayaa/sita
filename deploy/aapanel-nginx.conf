# Template Nginx aaPanel untuk SITA.
# Ganti DOMAIN dan path root sesuai server kampus.

server {
    listen 80;
    # Aktifkan SSL dari panel aaPanel, atau isi certificate berikut lalu buka listen 443.
    # listen 443 ssl http2;
    # ssl_certificate /www/server/panel/vhost/cert/DOMAIN/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/DOMAIN/privkey.pem;
    server_name DOMAIN;

    root /www/wwwroot/DOMAIN/public;
    index index.php index.html;

    client_max_body_size 50M;

    access_log /www/wwwlogs/DOMAIN.log;
    error_log /www/wwwlogs/DOMAIN.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Livewire/Filament menyajikan sebagian asset lewat route Laravel.
    # Rule ini harus berada sebelum rule static .js/.css bawaan aaPanel.
    location ~ ^/livewire(?:-|/) {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel Reverb websocket proxy. Reverb process berjalan lokal di 127.0.0.1:8080,
    # browser tetap memakai domain HTTPS/WSS port 443.
    location ~ ^/(app|apps) {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 60;
        proxy_send_timeout 60;
        proxy_pass http://127.0.0.1:8080;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|ico|webp|avif|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* ^/(?:app|bootstrap|config|database|deploy|docs|resources|routes|storage|tests|vendor)/ {
        deny all;
    }
}
