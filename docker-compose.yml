x-build-args: &build-args
  INSTALL_DEV_DEPENDENCIES: ${INSTALL_DEV_DEPENDENCIES:-false}
  VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY:-local-key}
  VITE_REVERB_HOST: ${FRONTEND_REVERB_HOST:-localhost}
  VITE_REVERB_PORT: ${REVERB_EXPOSE_PORT:-8089}
  VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}

x-app-build: &app-build
  context: .
  dockerfile: docker/Dockerfile
  args: *build-args

x-init-build: &init-build
  context: .
  dockerfile: docker/Dockerfile
  args:
    <<: *build-args
    INSTALL_DEV_DEPENDENCIES: ${INIT_INSTALL_DEV_DEPENDENCIES:-true}

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.docker
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - db_data:/var/lib/postgresql/data

  init:
    build:
      <<: *init-build
      target: app
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    command: ['init']
    restart: 'no'
    volumes:
      - storage_data:/var/www/html/storage

  app:
    build:
      <<: *app-build
      target: app
    env_file:
      - .env.docker
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    command: ['php-fpm', '-F']
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'SCRIPT_NAME=/up SCRIPT_FILENAME=/var/www/html/public/index.php REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 > /dev/null',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - storage_data:/var/www/html/storage

  web:
    build:
      <<: *app-build
      target: web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - '8088:80'

  queue:
    build:
      <<: *app-build
      target: app
    env_file:
      - .env.docker
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    command: ['queue']
    volumes:
      - storage_data:/var/www/html/storage

  scheduler:
    build:
      <<: *app-build
      target: app
    env_file:
      - .env.docker
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    command: ['scheduler']
    volumes:
      - storage_data:/var/www/html/storage

  reverb:
    build:
      <<: *app-build
      target: app
    env_file:
      - .env.docker
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    command: ['reverb']
    ports:
      - '${REVERB_EXPOSE_PORT:-8089}:8080'
    volumes:
      - storage_data:/var/www/html/storage

volumes:
  db_data:
  storage_data:
